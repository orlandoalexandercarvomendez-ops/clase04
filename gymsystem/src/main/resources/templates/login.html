<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GYM SYSTEM</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-page">
<div class="login-card">
    <img th:src="@{/img/logo.png}" alt="Logo del gimnasio">
    <h2>GYM SYSTEM</h2>

    <div class="field">
        <label for="usuario">Usuario</label>
        <input id="usuario" type="text" placeholder="admin">
    </div>
    <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="1234">
    </div>
    <div class="actions">
        <a class="btn btn-primary" th:href="@{/main}">Ingresar</a>
    </div>
</div>
</body>
</html>
